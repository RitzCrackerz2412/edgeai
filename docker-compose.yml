version: '3.9'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://edgeai:edgeai@postgres:5432/edgeai
      REDIS_URL:    redis://redis:6379
      AUTH_SECRET:  ${AUTH_SECRET:-dev-secret-replace-in-production}
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV:     production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout:  5s
      retries:  3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     edgeai
      POSTGRES_PASSWORD: edgeai
      POSTGRES_DB:       edgeai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U edgeai']
      interval: 5s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test:     ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout:  5s
      retries:  5

  # DB migration job — runs once on startup
  migrate:
    build: .
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://edgeai:edgeai@postgres:5432/edgeai
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
